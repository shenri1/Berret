# ── Window ────────────────────────────────────────────────────────────────────
[window]
decorations        = "full"
dynamic_title      = false          # title managed by zellij/prompt, not alacritty
startup_mode       = "Windowed"
padding.x          = 0
padding.y          = 0

[window.dimensions]
columns = 0
lines   = 0

# ── Shell ─────────────────────────────────────────────────────────────────
[terminal.shell]
program = "zellij"

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history    = 0          # zellij manages its own scrollback
multiplier = 3

# ── Mouse ─────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# Right click: copy if something is selected, paste if nothing is selected
[[mouse.bindings]]
mouse  = "Right"
action = "ExpandSelection"

[[mouse.bindings]]
mouse  = "Right"
mods   = "Shift"
action = "Paste"

# Middle click: paste from primary selection (standard X11 / Wayland behavior)
[[mouse.bindings]]
mouse  = "Middle"
action = "PasteSelection"

# Ctrl+Shift+C / Ctrl+Shift+V — explicit copy/paste (always available)
[[keyboard.bindings]]
key    = "C"
mods   = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key    = "V"
mods   = "Control|Shift"
action = "Paste"
