# ── Window ────────────────────────────────────────────────────────────────────
[window]
decorations        = "full"
dynamic_title      = false          # title managed by zellij/prompt, not alacritty
startup_mode       = "Windowed"
padding.x          = 0
padding.y          = 0

[window.dimensions]
columns = 0
lines   = 0

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history    = 0          # zellij manages its own scrollback
multiplier = 3

# ── Mouse ─────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# Right click: copy if something is selected, paste if nothing is selected
[[mouse.bindings]]
mouse  = "Right"
action = "ExpandSelection"

[[mouse.bindings]]
mouse  = "Right"
mods   = "Shift"
action = "Paste"

# Middle click: paste from primary selection (standard X11 / Wayland behavior)
[[mouse.bindings]]
mouse  = "Middle"
action = "PasteSelection"

# ── Keyboard ──────────────────────────────────────────────────────────────────
# Ctrl+T → new zellij tab
# Sends the zellij default keybind sequence: Ctrl+T in normal mode opens new tab
[[keyboard.bindings]]
key    = "T"
mods   = "Control"
chars  = "\u0002c"      # zellij: prefix + c = new tab

# Ctrl+W → close current zellij tab/pane
[[keyboard.bindings]]
key    = "W"
mods   = "Control"
chars  = "\u0002x"      # zellij: prefix + x = close pane

# Ctrl+Shift+C / Ctrl+Shift+V — explicit copy/paste (always available)
[[keyboard.bindings]]
key    = "C"
mods   = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key    = "V"
mods   = "Control|Shift"
action = "Paste"
